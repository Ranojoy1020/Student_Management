# Server
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:mem:studentdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
app.jwt.secret=U3R1ZGVudE1hbmFnZW1lbnRTZWNyZXRLZXkyMDI0X1ZlcnlMb25nQW5kU2VjdXJlQmFzZTY0RW5jb2RlZFNlY3JldEtleUZvckhTMjU2QWxnbw==
app.jwt.expiration-ms=86400000

# Logging
logging.level.com.studentmgmt=DEBUG
logging.level.org.springframework.security=INFO
